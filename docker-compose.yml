services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tourplanner
      POSTGRES_USER: tourplanner
      POSTGRES_PASSWORD: tourplanner_pw
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      TP_DB_URL: jdbc:postgresql://db:5432/tourplanner
      TP_DB_USER: tourplanner
      TP_DB_PASSWORD: tourplanner_pw
      TP_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      TP_ORS_API_KEY: ${TP_ORS_API_KEY}
      TP_IMAGE_STORAGE_PATH: /app/tour-images

volumes:
  pgdata:
