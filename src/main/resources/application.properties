spring.application.name=demo


# DataSource (use environment variables; fall back to in-memory H2 for tests)
spring.datasource.url=${TP_DB_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${TP_DB_USER:sa}
spring.datasource.password=${TP_DB_PASSWORD:}

# Hibernate DDL and dialect (dialect can be overridden via TP_HIBERNATE_DIALECT)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${TP_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

tourplanner.ors.api-key=${TP_ORS_API_KEY}
tourplanner.image.storage-path=${TP_IMAGE_STORAGE_PATH}

# JWT Authentication
tourplanner.jwt.secret=${TP_JWT_SECRET:dev-secret-key-minimum-32-chars-ok}
tourplanner.jwt.expiration-hours=24

# Logging Configuration for slf4j
logging.level.root=info
logging.file.name=logs/tourplanner.log
